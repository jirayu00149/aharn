<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>เฮียดี้ ก๋วยเตี๋ยวเรือ</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fff8ef;
        color: #2f3437;
      }

      a {
        color: #1aa6d9;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <p>กำลังเปิด <a id="fallbackLink" href="./admin.html">คลิกที่นี่</a></p>
    <script>
      (function () {
        const isTableSession = window.location.hash.startsWith("#table=");
        const params = new URLSearchParams(window.location.search);
        const wantsCustomer = params.has("customer");
        const target = isTableSession || wantsCustomer
          ? `./DesignTool/index.html${window.location.search}${window.location.hash}`
          : "./admin.html";
        document.getElementById("fallbackLink").href = target;
        window.location.replace(target);
      })();
    </script>
  </body>
</html>
